<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a0a"/>
      <stop offset="100%" style="stop-color:#5c3a1e"/>
    </linearGradient>
    <linearGradient id="vg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2D2BD"/>
      <stop offset="100%" style="stop-color:#E6E6FA"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Decorative top bar -->
  <rect x="10" y="10" width="44" height="3" rx="1.5" fill="url(#vg)" opacity="0.4"/>
  <!-- Bold V letterform -->
  <path d="M14 18 L32 48 L50 18" 
        stroke="url(#vg)" stroke-width="6" 
        stroke-linecap="round" stroke-linejoin="round" 
        fill="none"/>
  <!-- Bottom accent dot -->
  <circle cx="32" cy="52" r="2.5" fill="#F2D2BD" opacity="0.6"/>
</svg>
