server {
    listen 80;
    server_name resunexi.com www.resunexi.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name resunexi.com www.resunexi.com;

    ssl_certificate     /etc/letsencrypt/live/resunexi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resunexi.com/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
